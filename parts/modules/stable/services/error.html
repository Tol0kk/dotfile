<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found</title>
    <style>
      /* Default Light Mode */
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #f9fafb;
        color: #1f2937;
        text-align: center;
        transition:
          background-color 0.3s,
          color 0.3s;
      }
      h1 {
        font-size: 2.5rem;
        margin-bottom: 0.5rem;
      }
      p {
        font-size: 1.125rem;
        color: #4b5563;
      }

      /* Dark Mode Detection */
      @media (prefers-color-scheme: dark) {
        body {
          background-color: #111827;
          color: #f9fafb;
        }
        p {
          color: #9ca3af;
        }
      }
    </style>
  </head>
  <body>
    <h1>404</h1>
    <p>This page is not available.</p>
  </body>
</html>
