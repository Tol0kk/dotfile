<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#334155" stroke-width="1" opacity="0.3" />
    </pattern>
  </defs>

  <rect width="256" height="256" rx="48" fill="#0F172A" />
  <rect width="256" height="256" rx="48" fill="url(#grid)" />

  <path d="M 24 216 L 232 216" stroke="#334155" stroke-width="4" stroke-linecap="round" />

  <line x1="68" y1="130" x2="68" y2="216" stroke="#EF4444" stroke-width="4" stroke-dasharray="10 6" stroke-linecap="round" />
  <line x1="188" y1="130" x2="188" y2="216" stroke="#EF4444" stroke-width="4" stroke-dasharray="10 6" stroke-linecap="round" />

  <g filter="url(#shadow)">
    <rect x="88" y="100" width="80" height="116" rx="8" fill="#1E293B" stroke="#8B5CF6" stroke-width="6" />
    
    <rect x="104" y="96" width="16" height="8" fill="#38BDF8" rx="2" />
    <rect x="136" y="96" width="16" height="8" fill="#F59E0B" rx="2" />
    
    <line x1="104" y1="120" x2="152" y2="120" stroke="#8B5CF6" stroke-width="4" stroke-linecap="round" />
    <line x1="104" y1="140" x2="152" y2="140" stroke="#8B5CF6" stroke-width="4" stroke-linecap="round" />
    <line x1="104" y1="160" x2="152" y2="160" stroke="#8B5CF6" stroke-width="4" stroke-linecap="round" />
    
    <circle cx="112" cy="192" r="5" fill="#10B981" filter="url(#glow)" />
    <circle cx="132" cy="192" r="4" fill="#64748B" />
    <circle cx="148" cy="192" r="4" fill="#64748B" />
  </g>

  <circle cx="48" cy="200" r="16" fill="#1E293B" stroke="#38BDF8" stroke-width="4" />
  <circle cx="48" cy="200" r="6" fill="#38BDF8" />
  
  <circle cx="208" cy="200" r="16" fill="#1E293B" stroke="#F59E0B" stroke-width="4" />
  <circle cx="208" cy="200" r="6" fill="#F59E0B" />

  <path d="M 48 184 L 48 80 C 48 32, 112 32, 112 84" fill="none" stroke="#38BDF8" stroke-width="8" stroke-linecap="round" />
  <polygon points="100,80 124,80 112,96" fill="#38BDF8" />

  <path d="M 144 96 C 144 32, 208 32, 208 80 L 208 170" fill="none" stroke="#F59E0B" stroke-width="8" stroke-linecap="round" />
  <polygon points="196,168 220,168 208,184" fill="#F59E0B" />

</svg>
